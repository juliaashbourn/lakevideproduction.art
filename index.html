<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Automated Redirect after 3 seconds -->
    <meta http-equiv="refresh" content="3;url=https://www.lakevide.com">
    <title>Lakevide LLC | Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; }
        .loader {
            border: 2px solid #1a1a1a;
            border-top: 2px solid #10b981; /* Emerald Green */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="text-center p-10 max-w-lg">
        <!-- Brand Identity -->
        <h1 class="text-4xl font-black tracking-tighter mb-4 uppercase italic">
            LAKE<span class="text-emerald-500">VIDE</span>
        </h1>
        
        <div class="flex justify-center mb-8">
            <div class="loader"></div>
        </div>

        <p class="text-zinc-500 text-sm tracking-widest uppercase mb-12">
            Redirecting you to our official platform
        </p>

        <!-- Fallback Link -->
        <div class="border-t border-zinc-900 pt-8">
            <p class="text-zinc-600 text-[10px] uppercase tracking-widest mb-4">
                Not redirecting? Click the secure link below:
            </p>
            <a href="https://www.lakevide.com" class="text-emerald-500 font-bold hover:underline">
                www.lakevide.com
            </a>
        </div>

        <!-- Corporate Metadata -->
        <div class="mt-20 opacity-30 text-[9px] uppercase tracking-[0.4em] space-y-2">
            <p>Lakevide LLC • Sherwood, Oregon</p>
            <p>17303 SW Granita Ln, 97140</p>
        </div>
    </div>

</body>
</html>
